# Dev override: mount source for hot-reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  pool:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/app/app
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8421", "--reload"]
    environment:
      - DEBUG=1
